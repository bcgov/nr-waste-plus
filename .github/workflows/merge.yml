name: Merge

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/*"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  vars:
    name: Set Variables
    outputs:
      pr: ${{ steps.pr.outputs.pr }}
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      # Get PR number for squash merges to main
      - name: PR Number
        id: pr
        uses: bcgov/action-get-pr@28b0adf8e4d40720d41f9c87356ce24b0a4bd6af # v0.3.1

  deploy-test:
    name: Deploy (TEST)
    secrets: inherit
    uses: ./.github/workflows/.deploy.yml
    with:
      environment: test
      target: test
      zone: test
      url: nr-waste-plus-test-frontend.apps.silver.devops.gov.bc.ca
      configmap-backend: |-
        info:
          app:
            component: backend
      configmap-frontend: |-
        window.config = {
          ...(window.config ?? {}),
          VITE_FEATURE_FLAGS: {
            'offline-mode-enabled': false,
          },
        };

  deploy-prod:
    name: Deploy (PROD)
    needs: [deploy-test]
    secrets: inherit
    uses: ./.github/workflows/.deploy.yml
    with:
      environment: prod
      target: prod
      zone: prod
      url: nr-waste-plus-prod-frontend.apps.silver.devops.gov.bc.ca
      configmap-backend: |-
        info:
          app:
            component: backend
        ca:
          bc:
            gov:
              nrs:
                frontend:
                  cors:
                    origins:
                      - https://wasteplus.nrs.gov.bc.ca
      configmap-frontend: |-
        window.config = {
          ...(window.config ?? {}),
          VITE_FEATURE_FLAGS: {
            'offline-mode-enabled': false,
          },
        };

  images-prod:
    name: Promote images to PROD
    needs: [vars, deploy-prod]
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component: [backend, frontend, legacy, database]
    steps:
      - uses: shrink/actions-docker-registry-tag@e6aaef25c595b6e0edd18bf4c7dbfea3abd43299 # v5
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ matrix.component }}
          target: ${{ needs.vars.outputs.pr }}
          tags: prod

  release:
    name: Release
    needs: [deploy-prod]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Conventional Changelog Update
        uses: TriPSs/conventional-changelog-action@952b14bbc4be87e8458a6ac5926fc655608b1b19 # v6
        id: changelog
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          output-file: "CHANGELOG.md"
          skip-version-file: "true"
          skip-commit: "true"
          git-push: "true"

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        if: steps.changelog.outputs.tag != ''
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          token: ${{ github.token }}
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
