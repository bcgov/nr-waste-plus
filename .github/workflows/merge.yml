name: Merge

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/*"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  vars:
    name: Set Variables
    outputs:
      pr: ${{ steps.pr.outputs.pr }}
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      # Get PR number for squash merges to main
      - name: PR Number
        id: pr
        uses: bcgov/action-get-pr@bfa713a9ab410c0f0c13126c35983934fc80d15b # v0.1.1

  deploy-test:
    name: Deploy (TEST)
    secrets: inherit
    uses: ./.github/workflows/.deploy.yml
    with:
      environment: test
      target: test
      zone: test
      url: nr-waste-plus-test-frontend.apps.silver.devops.gov.bc.ca
      configmap-backend: |-
        info:
          app:
            component: backend
      configmap-frontend: |-
        window.localStorage.setItem(\"VITE_FEATURE_FLAGS\",'{}');
        window.localStorage.setItem(\"VITE_FEATURES_OFFLINE\",'false');

  deploy-prod:
    name: Deploy (PROD)
    needs: [deploy-test]
    secrets: inherit
    uses: ./.github/workflows/.deploy.yml
    with:
      environment: prod
      target: prod
      zone: prod
      url: nr-waste-plus-prod-frontend.apps.silver.devops.gov.bc.ca
      configmap-backend: |-
        info:
          app:
            component: backend
        ca:
          bc:
            gov:
              nrs:
                frontend:
                  cors:
                    origins:
                      - https://wasteplus.nrs.gov.bc.ca
      configmap-frontend: |-
        window.localStorage.setItem(\"VITE_FEATURE_FLAGS\",'{}');
        window.localStorage.setItem(\"VITE_FEATURES_OFFLINE\",'false');

  images-prod:
    name: Promote images to PROD
    needs: [vars, deploy-prod]
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component: [backend, frontend, legacy, database]
    steps:
      - uses: shrink/actions-docker-registry-tag@e6aaef25c595b6e0edd18bf4c7dbfea3abd43299 # v5
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ matrix.component }}
          target: ${{ needs.vars.outputs.pr }}
          tags: prod

  release:
    name: Release
    needs: [deploy-prod]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Conventional Changelog Update
        uses: TriPSs/conventional-changelog-action@91be4f3188da74fe85de9caffcebc80b26d43b5b # v6
        id: changelog
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          output-file: "CHANGELOG.md"
          skip-version-file: "true"
          skip-commit: "true"
          git-push: "true"

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        if: steps.changelog.outputs.tag != ''
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          token: ${{ github.token }}
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
